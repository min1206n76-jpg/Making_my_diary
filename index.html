<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Creative Journal</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            margin: 0;
            perspective: 2000px;
        }

        .book {
            width: 450px;
            height: 600px;
            position: relative;
            transform-style: preserve-3d;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer;
        }

        /* 각 페이지의 위치 설정 (나중에 쌓이는 순서) */
        .page img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            backface-visibility: hidden;
            border-radius: 0 15px 15px 0;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.1);
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        /* 클릭 영역 설정 */
        .click-area {
            position: fixed;
            top: 0;
            width: 50vw;
            height: 100vh;
            z-index: 1000;
        }
        .right-click { right: 0; cursor: e-resize; }
        .left-click { left: 0; cursor: w-resize; }
    </style>
</head>
<body>

    <div class="book" id="book">
        <div class="page" style="z-index: 5;"><img src="my_diary_image/diary1.jpeg" alt="1"></div>
        <div class="page" style="z-index: 4;"><img src="my_diary_image/diary2.jpeg" alt="2"></div>
        <div class="page" style="z-index: 3;"><img src="my_diary_image/diary3.jpeg" alt="3"></div>
        <div class="page" style="z-index: 2;"><img src="my_diary_image/diary4.jpeg" alt="4"></div>
        <div class="page" style="z-index: 1;"><img src="my_diary_image/comics.jpeg" alt="5"></div>
    </div>

    <div class="click-area left-click" onclick="prevPage()"></div>
    <div class="click-area right-click" onclick="nextPage()"></div>

    <script>
        const pages = document.querySelectorAll('.page');
        let currentIdx = 0; // 현재 보고 있는 페이지 (맨 위)

        function nextPage() {
            if (currentIdx < pages.length) {
                pages[currentIdx].classList.add('flipped');
                currentIdx++;
            }
        }

        function prevPage() {
            if (currentIdx > 0) {
                currentIdx--;
                pages[currentIdx].classList.remove('flipped');
            }
        }
    </script>
</body>
</html>
